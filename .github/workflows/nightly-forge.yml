name: Nightly canon forge

on:
  schedule:
    - cron: "0 20 * * *" # 20:00 UTC nightly
  workflow_dispatch: {} # manual run from the Actions tab

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/forge.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_BASE: main
          # Add ANTHROPIC_API_KEY as a repo Actions secret to activate; until then the script is inert.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
